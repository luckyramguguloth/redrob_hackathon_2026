# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A robust, rule-based candidate ranker tailored for the Senior AI Engineer role. It applies a multi-stage pipeline: (1) schema validation and parsing, (2) rule-based honeypot detection to identify and flag inconsistent profiles, (3) knockout filtering, (4) tiered skill scoring against required search/retrieval profiles, (5) career trajectory analysis, and (6) a multiplicative behavioral modifier based on platform engagement signals. This ensures high-intent, technically strong candidates are ranked highest.

